<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definition for drop shadows and filters -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Circle with Shadow -->
  <circle cx="256" cy="256" r="220" fill="#e2f0fd" stroke="#ffffff" stroke-width="8" filter="url(#shadow)" />
  
  <!-- Tiny Stars in Background -->
  <path d="M 120,130 L 122,136 L 128,138 L 122,140 L 120,146 L 118,140 L 112,138 L 118,136 Z" fill="#93c5fd" />
  <path d="M 380,280 L 382,286 L 388,288 L 382,290 L 380,296 L 378,290 L 372,288 L 378,286 Z" fill="#93c5fd" />
  <path d="M 370,160 L 371.5,164.5 L 376,166 L 371.5,167.5 L 370,172 L 368.5,167.5 L 364,166 L 368.5,164.5 Z" fill="#93c5fd" />
  <path d="M 130,290 L 131.5,294.5 L 136,296 L 131.5,297.5 L 130,302 L 128.5,297.5 L 124,296 L 128.5,294.5 Z" fill="#93c5fd" />
  <circle cx="160" cy="190" r="3" fill="#93c5fd" />
  <circle cx="320" cy="330" r="2" fill="#93c5fd" />
  <circle cx="180" cy="340" r="2.5" fill="#93c5fd" />
  <circle cx="340" cy="120" r="3.5" fill="#93c5fd" />

  <!-- ASTRONAUT SUIT (Body) -->
  <!-- Left Arm (Waving) -->
  <!-- Outer Stroke -->
  <path d="M 160,340 C 130,310 110,260 120,240" fill="none" stroke="#0f172a" stroke-width="18" stroke-linecap="round" />
  <!-- Inner White Fill -->
  <path d="M 160,340 C 130,310 110,260 120,240" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
  <!-- Glove -->
  <circle cx="120" cy="235" r="18" fill="#ffffff" stroke="#0f172a" stroke-width="6" />
  <circle cx="132" cy="242" r="8" fill="#ffffff" stroke="#0f172a" stroke-width="5" />
  <path d="M 115,220 C 110,215 105,225 110,230" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />

  <!-- Right Arm (Resting on hip) -->
  <!-- Outer Stroke -->
  <path d="M 352,340 C 385,345 400,370 385,395" fill="none" stroke="#0f172a" stroke-width="18" stroke-linecap="round" />
  <!-- Inner White Fill -->
  <path d="M 352,340 C 385,345 400,370 385,395" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
  <!-- Glove -->
  <circle cx="380" cy="400" r="18" fill="#ffffff" stroke="#0f172a" stroke-width="6" />
  <circle cx="366" cy="396" r="8" fill="#ffffff" stroke="#0f172a" stroke-width="5" />

  <!-- Main Suit Body / Shoulders -->
  <path d="M 146,420 C 146,335 196,305 256,305 C 316,305 366,335 366,420 C 366,450 346,460 256,460 C 166,460 146,450 146,420 Z" fill="#ffffff" stroke="#0f172a" stroke-width="10" stroke-linejoin="round" />
  
  <!-- Chest Plate Shadow/Contrast -->
  <path d="M 190,360 C 190,340 322,340 322,360 L 310,452 C 280,458 230,458 202,452 Z" fill="#f8fafc" stroke="#0f172a" stroke-width="8" stroke-linejoin="round" />
  
  <!-- Suit Collar / Neck Ring -->
  <path d="M 190,314 C 190,335 322,335 322,314" fill="none" stroke="#0f172a" stroke-width="10" stroke-linecap="round" />

  <!-- Helmet Ears/Receivers -->
  <!-- Left Ear Receiver -->
  <rect x="122" y="210" width="32" height="64" rx="16" fill="#ffffff" stroke="#0f172a" stroke-width="10" transform="rotate(-12 138 242)" stroke-linejoin="round" />
  <rect x="130" y="222" width="16" height="40" rx="8" fill="#e2e8f0" stroke="#0f172a" stroke-width="6" transform="rotate(-12 138 242)" stroke-linejoin="round" />
  
  <!-- Right Ear Receiver -->
  <rect x="358" y="210" width="32" height="64" rx="16" fill="#ffffff" stroke="#0f172a" stroke-width="10" transform="rotate(12 374 242)" stroke-linejoin="round" />
  <rect x="366" y="222" width="16" height="40" rx="8" fill="#e2e8f0" stroke="#0f172a" stroke-width="6" transform="rotate(12 374 242)" stroke-linejoin="round" />

  <!-- Helmet Base -->
  <circle cx="256" cy="236" r="102" fill="#ffffff" stroke="#0f172a" stroke-width="10" />

  <!-- Helmet Visor -->
  <path d="M 172,236 C 172,176 340,176 340,236 C 340,296 172,296 172,236 Z" fill="#0f172a" stroke="#0f172a" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Visor Reflection Left (large ellipse) -->
  <ellipse cx="292" cy="220" rx="15" ry="26" fill="#ffffff" transform="rotate(-20 292 220)" opacity="0.95" />
  <!-- Visor Reflection Right (small circle) -->
  <circle cx="316" cy="242" r="9" fill="#ffffff" opacity="0.95" />
</svg>
