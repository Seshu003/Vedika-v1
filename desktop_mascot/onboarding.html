<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vedika – First Launch</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            font-family: 'Outfit', sans-serif;
            background: transparent;
            overflow: hidden;
            color: #f1f5f9;
        }

        /* ─── Glassmorphism card ─── */
        .card {
            width: 520px;
            background: linear-gradient(135deg,
                rgba(15, 23, 42, 0.97) 0%,
                rgba(8, 25, 55, 0.97) 100%);
            border: 1.5px solid rgba(56, 189, 248, 0.35);
            border-radius: 28px;
            box-shadow:
                0 0 60px rgba(56, 189, 248, 0.12),
                0 40px 80px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 36px 26px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle star background */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(2px 2px at 55% 10%, rgba(56,189,248,0.6) 0%, transparent 100%),
                radial-gradient(2px 2px at 90% 50%, rgba(168,85,247,0.4) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Glow accent top */
        .glow-ring {
            position: absolute;
            top: -80px; left: 50%;
            transform: translateX(-50%);
            width: 300px; height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(56, 189, 248, 0.15) 0%,
                transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* All content above pseudo-elements */
        .content { position: relative; z-index: 1; width: 100%; display: contents; }

        /* ─── Mascot SVG row ─── */
        .mascot-row {
            display: flex; align-items: center; gap: 18px; width: 100%; margin-bottom: 18px;
        }

        .mini-mascot {
            width: 88px; height: 88px; flex-shrink: 0;
            animation: float-onboard 3s ease-in-out infinite;
        }

        @keyframes float-onboard {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-7px); }
        }

        .greeting { flex: 1; }

        .greeting h1 {
            font-size: 21px; font-weight: 700;
            background: linear-gradient(90deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.25;
            margin-bottom: 5px;
        }

        .greeting p {
            font-size: 12.5px; color: #94a3b8; line-height: 1.5;
        }

        /* ─── Divider ─── */
        .divider {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(56,189,248,0.35), transparent);
            margin: 2px 0 16px;
        }

        /* ─── Form ─── */
        .form { width: 100%; display: flex; flex-direction: column; gap: 14px; }

        .field { display: flex; flex-direction: column; gap: 5px; }

        .field label {
            font-size: 12px; font-weight: 600;
            color: #94a3b8; letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .field input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(56, 189, 248, 0.25);
            border-radius: 12px;
            color: #f1f5f9;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            padding: 10px 15px;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .field input::placeholder { color: #475569; }
        .field input:focus {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.08);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
        }
        .field input.shake {
            animation: input-shake 0.35s ease;
        }
        @keyframes input-shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-6px); }
            40%       { transform: translateX(6px); }
            60%       { transform: translateX(-4px); }
            80%       { transform: translateX(4px); }
        }

        /* ─── Row for Name + Age side-by-side ─── */
        .row { display: grid; grid-template-columns: 1fr 90px; gap: 12px; }

        /* ─── Advanced API key toggle ─── */
        .advanced-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #64748b;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            user-select: none;
            transition: color 0.2s;
        }
        .advanced-toggle:hover { color: #38bdf8; }
        .advanced-toggle .chevron {
            display: inline-block;
            transition: transform 0.25s ease;
            font-size: 10px;
        }
        .advanced-toggle.open .chevron { transform: rotate(90deg); }

        .advanced-section {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }
        .advanced-section.open { max-height: 200px; }

        .api-hint {
            font-size: 11.5px;
            color: #475569;
            margin-top: 5px;
        }
        .api-hint a {
            color: #38bdf8;
            text-decoration: none;
        }
        .api-hint a:hover { text-decoration: underline; }

        /* ─── Error ─── */
        .error-msg {
            color: #ef4444; font-size: 12px; text-align: center;
            min-height: 16px; transition: opacity 0.2s;
        }

        /* ─── Button ─── */
        .btn-launch {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            border: none; border-radius: 14px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 15px; font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.03em;
            position: relative; overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-launch:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(56, 189, 248, 0.45);
        }
        .btn-launch:active:not(:disabled) { transform: translateY(0); }
        .btn-launch:disabled { opacity: 0.7; cursor: not-allowed; }

        /* ripple overlay */
        .btn-launch::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
            border-radius: inherit;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-launch.loading .spinner { display: block; }
        .btn-launch.loading .btn-text { opacity: 0.7; }

        /* ─── Footer ─── */
        .footer {
            margin-top: 10px;
            font-size: 11px;
            color: #334155;
            text-align: center;
        }

        /* ─── Step progress dots ─── */
        .step-dots {
            display: flex; gap: 6px; margin-bottom: 14px;
        }
        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(56,189,248,0.25);
            transition: background 0.3s, width 0.3s;
        }
        .dot.active {
            background: #38bdf8;
            width: 18px; border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="glow-ring"></div>

    <!-- Step dots -->
    <div class="step-dots content">
        <div class="dot active" id="dot1"></div>
        <div class="dot" id="dot2"></div>
    </div>

    <!-- Mascot + Greeting -->
    <div class="mascot-row content">
        <!-- Mini astronaut SVG -->
        <svg class="mini-mascot" viewBox="0 0 300 300">
            <g id="a">
                <rect x="108" y="140" width="84" height="65" rx="15" fill="#fff" stroke="#1d1d1f" stroke-width="5"/>
                <path d="M 125 198 L 125 228 C 125 234,116 235,116 242 C 116 246,146 246,146 242 C 146 235,143 228,143 198 Z"
                      fill="#fff" stroke="#1d1d1f" stroke-width="5"/>
                <path d="M 175 198 L 175 228 C 175 234,184 235,184 242 C 184 246,154 246,154 242 C 154 235,157 228,157 198 Z"
                      fill="#fff" stroke="#1d1d1f" stroke-width="5"/>
                <path d="M 120 148 C 108 148,108 200,122 205 C 132 208,168 208,178 205 C 192 200,192 148,180 148 Z"
                      fill="#fff" stroke="#1d1d1f" stroke-width="5"/>
                <path d="M 120 150 C 97 150,95 182,99 196 C 102 203,114 203,118 196 C 122 188,124 170,124 158 Z"
                      fill="#fff" stroke="#1d1d1f" stroke-width="5"/>
                <path d="M 180 150 C 203 150,205 182,201 196 C 198 203,186 203,182 196 C 178 188,176 170,176 158 Z"
                      fill="#fff" stroke="#1d1d1f" stroke-width="5"/>
                <rect x="94"  y="90" width="13" height="30" rx="6.5" fill="#fff" stroke="#1d1d1f" stroke-width="5"/>
                <rect x="193" y="90" width="13" height="30" rx="6.5" fill="#fff" stroke="#1d1d1f" stroke-width="5"/>
                <circle cx="150" cy="105" r="48" fill="#fff" stroke="#1d1d1f" stroke-width="5"/>
                <ellipse cx="150" cy="107" rx="39" ry="34" fill="#0b0c10" stroke="#1d1d1f" stroke-width="4.5"/>
                <path d="M 120 98 A 30 25 0 0 1 155 85 A 35 30 0 0 0 120 108 Z" fill="#fff" opacity="0.85"/>
                <circle cx="176" cy="98"  r="5.5" fill="#fff"/>
                <circle cx="172" cy="112" r="3"   fill="#fff"/>
                <circle cx="158" cy="168" r="4" fill="#38bdf8" stroke="#1d1d1f" stroke-width="2"/>
            </g>
        </svg>

        <div class="greeting">
            <h1>Hi! I'm Vedika! 👋</h1>
            <p>Your personal AI companion.<br>
               Let me get to know you before we blast off! 🚀</p>
        </div>
    </div>

    <div class="divider content"></div>

    <!-- Form -->
    <form class="form content" id="onboard-form" onsubmit="submitForm(event)">

        <div class="row">
            <div class="field">
                <label>Your Name</label>
                <input id="inp-name" type="text" placeholder="e.g. Priya"
                       autocomplete="off" maxlength="50" required>
            </div>
            <div class="field">
                <label>Age</label>
                <input id="inp-age" type="number" placeholder="16"
                       min="5" max="99" required>
            </div>
        </div>

        <!-- Advanced: API Key (collapsible) -->
        <div>
            <div class="advanced-toggle" id="adv-toggle" onclick="toggleAdvanced()">
                <span class="chevron">▶</span>
                <span>Advanced — Gemini API Key</span>
            </div>
            <div class="advanced-section" id="adv-section">
                <div class="field" style="margin-top:10px;">
                    <label>Gemini API Key <span style="color:#475569;font-weight:400;text-transform:none">(optional)</span></label>
                    <input id="inp-apikey" type="password" placeholder="AIza..."
                           autocomplete="off" maxlength="100">
                </div>
                <p class="api-hint">
                    Get a free key at
                    <a href="#" onclick="openStudio(); return false;">aistudio.google.com</a>
                    — enables on-device AI responses.
                </p>
            </div>
        </div>

        <div class="error-msg" id="err-msg"></div>

        <button type="submit" class="btn-launch" id="launch-btn">
            <span class="spinner"></span>
            <span class="btn-text">🚀 &nbsp;Let's Blast Off!</span>
        </button>
    </form>

    <div class="footer content">Your data stays on this device. Vedika never sends your info anywhere.</div>
</div>

<script>
    let advOpen = false;

    function toggleAdvanced() {
        advOpen = !advOpen;
        document.getElementById('adv-toggle').classList.toggle('open', advOpen);
        document.getElementById('adv-section').classList.toggle('open', advOpen);
        // Animate dot 2 to signal step 2 awareness
        document.getElementById('dot2').classList.toggle('active', advOpen);
        document.getElementById('dot1').classList.toggle('active', !advOpen);
    }

    function openStudio() {
        // Signal Python to open browser
        document.title = '__OPEN_URL__https://aistudio.google.com/app/apikey';
        setTimeout(() => { document.title = 'Vedika – First Launch'; }, 500);
    }

    function shakeInput(el) {
        el.classList.remove('shake');
        void el.offsetWidth; // force reflow
        el.classList.add('shake');
        el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
    }

    function setLoading(on) {
        const btn = document.getElementById('launch-btn');
        btn.disabled = on;
        btn.classList.toggle('loading', on);
        if (on) {
            btn.querySelector('.btn-text').textContent = 'Launching…';
        } else {
            btn.querySelector('.btn-text').innerHTML = '🚀 &nbsp;Let\'s Blast Off!';
        }
    }

    function submitForm(e) {
        e.preventDefault();
        const nameEl   = document.getElementById('inp-name');
        const ageEl    = document.getElementById('inp-age');
        const apiKeyEl = document.getElementById('inp-apikey');
        const errEl    = document.getElementById('err-msg');

        const name   = nameEl.value.trim();
        const age    = parseInt(ageEl.value, 10);
        const apiKey = apiKeyEl.value.trim();

        // Validation
        if (!name) {
            errEl.textContent = 'Please enter your name! 😊';
            shakeInput(nameEl);
            nameEl.focus();
            return;
        }
        if (!age || age < 5 || age > 99) {
            errEl.textContent = 'Please enter a valid age (5–99).';
            shakeInput(ageEl);
            ageEl.focus();
            return;
        }
        errEl.textContent = '';
        setLoading(true);

        // Brief delay for visual feedback before closing window
        setTimeout(() => {
            const data = JSON.stringify({ name, age, apiKey });
            document.title = '__ONBOARD__' + encodeURIComponent(data);
        }, 500);
    }

    // Auto-focus name input
    document.getElementById('inp-name').focus();
</script>

</body>
</html>
