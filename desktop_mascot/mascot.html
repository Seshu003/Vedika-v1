<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Vedika 2D Mascot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ═══════════════════════════════════
           MASCOT CONTAINER — everything lives here
        ═══════════════════════════════════ */
        .mascot-container {
            position: relative;
            width: 300px;
            height: 310px;   /* just enough: 280px SVG + ~30px gap for button */
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mascot-container:active { cursor: grabbing; }

        /* ═══════════════════════════════════
           PARTICLES
        ═══════════════════════════════════ */
        .particles-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        .particle {
            position: absolute;
            font-size: 14px;
            opacity: 0;
            animation: rise-fade 1.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rise-fade {
            0%   { transform: translate(0,0) scale(0.5); opacity: 0; }
            20%  { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.1); opacity: 0; }
        }

        /* ═══════════════════════════════════
           SPEECH BUBBLE
           Sits just above the helmet inside
           the container — no scrollbar, auto size
        ═══════════════════════════════════ */
        .speech-bubble {
            position: absolute;
            top: 6px;                     /* Near the top of the 320px container */
            left: 50%;
            transform: translateX(-50%) translateY(-6px) scale(0.88);
            transform-origin: bottom center;

            background: linear-gradient(
                145deg,
                rgba(8, 18, 48, 0.96) 0%,
                rgba(12, 26, 62, 0.96) 100%
            );
            border: 1.5px solid rgba(56, 189, 248, 0.5);
            border-radius: 16px;
            box-shadow:
                0 0 0 1px rgba(56,189,248,0.08),
                0 6px 28px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.06);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);

            color: #e2e8f0;
            padding: 10px 15px 12px;
            font-size: 12.5px;
            font-weight: 500;
            line-height: 1.55;
            text-align: center;
            white-space: normal;
            word-break: break-word;
            max-width: 230px;
            min-width: 120px;

            opacity: 0;
            pointer-events: none;
            z-index: 10;
            transition:
                opacity   0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .speech-bubble.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        /* Downward tail arrow */
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 50%;
            transform: translateX(-50%);
            border-left:  10px solid transparent;
            border-right: 10px solid transparent;
            border-top:   10px solid rgba(8, 18, 48, 0.96);
        }

        /* Subtle top glow line */
        .speech-bubble::before {
            content: '';
            position: absolute;
            top: 0; left: 18px; right: 18px; height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(56,189,248,0.55) 40%,
                rgba(168,85,247,0.4)  70%,
                transparent
            );
            border-radius: 50%;
        }

        /* ═══════════════════════════════════
           SVG
        ═══════════════════════════════════ */
        #mascot-svg {
            position: absolute;
            top: 10px; left: 0;
            width: 100%; height: 280px;
            overflow: visible;
            z-index: 2;
            transition: filter 0.7s ease;
        }

        #astronaut { transform-origin: 150px 160px; }

        /* Left arm — totally static */
        #left-arm { animation: none !important; }

        /* ═══════════════════════════════════
           TALK BUTTON — inside container,
           just below the astronaut feet
        ═══════════════════════════════════ */
        .talk-btn {
            position: absolute;
            bottom: 10px;      /* tight to the astronaut shadow */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 14px 6px 11px;
            border-radius: 30px;
            background: linear-gradient(
                135deg,
                rgba(14,165,233,0.14) 0%,
                rgba(99,102,241,0.14) 100%
            );
            border: 1.5px solid rgba(56,189,248,0.45);
            color: #7dd3fc;
            font-family: 'Outfit', sans-serif;
            font-size: 11.5px;
            font-weight: 700;
            letter-spacing: 0.11em;
            cursor: pointer;
            outline: none;
            z-index: 20;
            transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow:
                0 0 16px rgba(56,189,248,0.18),
                inset 0 1px 0 rgba(255,255,255,0.05);
            white-space: nowrap;
        }
        .talk-btn:hover {
            background: linear-gradient(
                135deg,
                rgba(14,165,233,0.24) 0%,
                rgba(99,102,241,0.24) 100%
            );
            border-color: rgba(56,189,248,0.8);
            color: #38bdf8;
            box-shadow: 0 0 26px rgba(56,189,248,0.38);
            transform: translateX(-50%) translateY(-2px);
        }
        .talk-btn:active {
            transform: translateX(-50%) scale(0.97);
        }
        .talk-btn .mic-svg {
            width: 14px; height: 14px;
            flex-shrink: 0;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        .talk-btn .btn-label { line-height: 1; }

        /* Listening state */
        .talk-btn.listening {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.65);
            color: #f87171;
            animation: pulse-talk 1.1s ease-in-out infinite;
        }
        @keyframes pulse-talk {
            0%,100% { box-shadow: 0 0 12px rgba(239,68,68,0.3); }
            50%      { box-shadow: 0 0 26px rgba(239,68,68,0.65); }
        }

        /* ═══════════════════════════════════
           IDLE STATE
        ═══════════════════════════════════ */
        .state-idle #astronaut { animation: float 3.5s ease-in-out infinite; }
        .state-idle #shadow    { animation: shadow-scale 3.5s ease-in-out infinite; }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }
        @keyframes shadow-scale {
            0%,100% { transform: scale(1); opacity: 0.8; }
            50%      { transform: scale(0.85); opacity: 0.4; }
        }

        /* ═══════════════════════════════════
           THINKING STATE
        ═══════════════════════════════════ */
        .state-thinking #astronaut {
            animation: thinking-bob 2.8s ease-in-out infinite;
        }
        @keyframes thinking-bob {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50%      { transform: translateY(-4px) rotate(3deg); }
        }

        /* ═══════════════════════════════════
           DANCE STATE
        ═══════════════════════════════════ */
        .state-dance #astronaut { animation: dancing 0.7s ease-in-out infinite; }
        .state-dance #shadow    { animation: dancing-shadow 0.7s ease-in-out infinite; }

        @keyframes dancing {
            0%,100% { transform: translateY(0) rotate(0deg) scale(1); }
            25%      { transform: translateY(-8px) rotate(-5deg) scale(1.03); }
            75%      { transform: translateY(-8px) rotate(5deg) scale(1.03); }
        }
        @keyframes dancing-shadow {
            0%,100% { transform: scale(1); opacity: 0.8; }
            50%      { transform: scale(0.8); opacity: 0.3; }
        }

        /* ═══════════════════════════════════
           SAD STATE
        ═══════════════════════════════════ */
        .state-sad #astronaut { transform: translateY(6px) rotate(-4deg); }
        .state-sad #shadow    { transform: scale(0.95); opacity: 0.55; }

        /* ═══════════════════════════════════
           SLEEP STATE
        ═══════════════════════════════════ */
        .state-sleep #mascot-svg   { filter: brightness(0.5) saturate(0.3); }
        .state-sleep #astronaut    { animation: sleep-breathe 4.5s ease-in-out infinite; }
        .state-sleep #shadow       { opacity: 0.25; animation: none; }
        .state-sleep #visor-highlights { opacity: 0; }

        @keyframes sleep-breathe {
            0%,100% { transform: scale(1) translateY(0); }
            50%      { transform: scale(1.016) translateY(-2px); }
        }

        /* ═══════════════════════════════════
           WAKE STATE
        ═══════════════════════════════════ */
        .state-wake #mascot-svg  { filter: brightness(1); }
        .state-wake #visor-highlights { opacity: 1; }
        .state-wake #astronaut {
            animation: wake-stretch 1.9s ease-in-out 1 forwards;
        }
        @keyframes wake-stretch {
            0%   { transform: scale(1)    translateY(0)    rotate(0deg); }
            15%  { transform: scale(0.92) translateY(7px)  rotate(-5deg); }
            45%  { transform: scale(1.1)  translateY(-16px) rotate(9deg); }
            65%  { transform: scale(1.04) translateY(-5px)  rotate(-2deg); }
            82%  { transform: scale(0.98) translateY(2px)   rotate(1deg); }
            100% { transform: scale(1)    translateY(0)    rotate(0deg); }
        }

        /* ─── Visor highlights ─── */
        #visor-highlights {
            transition: opacity 0.6s ease, transform 0.4s ease;
        }
        .state-thinking #visor-highlights { transform: translate(-3px,-5px); }
        .state-sad      #visor-highlights { transform: translate(-1px, 5px); }

        /* NO hover arm animations — both arms stay still */
        .right-arm { transform-origin: 176px 158px; }

        /* ─── Custom Animations ─── */
        @keyframes wave-arm {
            0%, 100% { transform: rotate(0deg); }
            25%, 65% { transform: rotate(-45deg); }
            45%, 85% { transform: rotate(-15deg); }
        }
        .anim-wave .right-arm { animation: wave-arm 0.8s ease-in-out; }

        @keyframes nod {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }
        .anim-nod #astronaut { animation: nod 0.5s ease-in-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-5px) rotate(-2deg); }
            75% { transform: translateX(5px) rotate(2deg); }
        }
        .anim-shake #astronaut { animation: shake 0.5s ease-in-out; }

        /* ─── Chest button glow ─── */
        #chest-button { transition: fill 0.3s, filter 0.3s; }
        .state-idle     #chest-button { animation: glow-blue   2s infinite ease-in-out; }
        .state-thinking #chest-button { animation: glow-amber  1.5s infinite ease-in-out; }
        .state-dance    #chest-button { animation: glow-rainbow 1s infinite linear; }
        .state-sad      #chest-button { fill:#ef4444; filter:drop-shadow(0 0 3px #ef4444); }
        .state-sleep    #chest-button { fill:#1e293b; filter:none; animation:none; }
        .state-wake     #chest-button { animation: glow-rainbow 0.5s infinite linear; }

        @keyframes glow-blue {
            0%,100% { fill:#0066ff; filter:drop-shadow(0 0 1px #0066ff); }
            50%      { fill:#38bdf8; filter:drop-shadow(0 0 5px #38bdf8); }
        }
        @keyframes glow-amber {
            0%,100% { fill:#f59e0b; filter:drop-shadow(0 0 1px #f59e0b); }
            50%      { fill:#fbbf24; filter:drop-shadow(0 0 5px #fbbf24); }
        }
        @keyframes glow-rainbow {
            0%   { fill:#a855f7; }
            33%  { fill:#22c55e; }
            66%  { fill:#eab308; }
            100% { fill:#a855f7; }
        }

        /* ═══════════════════════════════════
           CIRCULAR RADIAL MENU (PyQt version)
           Centered at CX=150, CY=140
        ═══════════════════════════════════ */
        .orbit-track {
            position: absolute;
            top: 140px; left: 150px;
            width: 210px; height: 210px;
            margin-top: -105px; margin-left: -105px;
            border-radius: 50%;
            border: 1px dashed rgba(56, 189, 248, 0.22);
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transform: scale(0.6);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .orbit-track.visible {
            opacity: 1;
            transform: scale(1);
        }

        .menu-item {
            position: absolute;
            top: 140px; left: 150px;
            width: 38px; height: 38px;
            margin-top: -19px; margin-left: -19px;
            border-radius: 50%;
            background: rgba(10, 14, 28, 0.95);
            border: 1.5px solid rgba(56, 189, 248, 0.25);
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 3;
            opacity: 0;
            transform: translate(0, 0) scale(0);
            transition: 
                transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
        }
        .menu-item svg {
            width: 16px; height: 16px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
        }
        .menu-item:hover {
            color: #38bdf8;
            background: rgba(10, 14, 28, 0.98);
            border-color: #38bdf8;
            transform: translate(var(--tx), var(--ty)) scale(1.15) !important;
            box-shadow: 0 0 14px rgba(56, 189, 248, 0.45);
        }
        .menu-item.active-item {
            background: #38bdf8;
            border-color: #38bdf8;
            color: #fff;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.85);
            transform: translate(var(--tx), var(--ty)) scale(1.2) !important;
        }

        /* Tooltip style */
        .menu-item .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(56, 189, 248, 0.4);
            color: #f1f5f9;
            font-size: 9.5px;
            font-weight: 700;
            padding: 3.5px 8px;
            border-radius: 6px;
            white-space: nowrap;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            z-index: 10;
        }
        .menu-item:hover .tooltip {
            opacity: 1;
        }

        /* Position tooltips based on quadrant */
        .menu-item.tp-top .tooltip    { bottom: 125%; left: 50%; transform: translateX(-50%); }
        .menu-item.tp-bottom .tooltip { top: 125%; left: 50%; transform: translateX(-50%); }
        .menu-item.tp-left .tooltip   { right: 125%; top: 50%; transform: translateY(-50%); }
        .menu-item.tp-right .tooltip  { left: 125%; top: 50%; transform: translateY(-50%); }
    </style>
</head>

<body class="state-idle">

    <div class="mascot-container" id="container">

        <!-- Orbit track line -->
        <div class="orbit-track" id="orbit-track"></div>

        <!-- Radial Circular Menu container -->
        <div class="circular-menu" id="circular-menu"></div>

        <!-- Particles -->
        <div class="particles-container" id="particles"></div>

        <!-- Speech Bubble — above the helmet -->
        <div class="speech-bubble" id="speech-bubble">Hello!</div>

        <!-- Astronaut SVG -->
        <svg id="mascot-svg" viewBox="0 0 300 300">
            <ellipse id="shadow" cx="150" cy="262" rx="35" ry="5.5"
                     fill="rgba(0,0,0,0.25)" />
            <g id="astronaut">
                <!-- Backpack -->
                <rect x="108" y="140" width="84" height="65" rx="15"
                      fill="#fff" stroke="#1d1d1f" stroke-width="4.5" stroke-linejoin="round"/>

                <!-- Left Leg -->
                <g id="left-leg">
                    <path d="M 125 198 L 125 228 C 125 234,116 235,116 242
                             C 116 246,146 246,146 242 C 146 235,143 228,143 198 Z"
                          fill="#fff" stroke="#1d1d1f" stroke-width="4.5" stroke-linejoin="round"/>
                    <path d="M 123 228 Q 133 231 143 228"
                          fill="none" stroke="#1d1d1f" stroke-width="4.5" stroke-linecap="round"/>
                </g>

                <!-- Right Leg -->
                <g id="right-leg">
                    <path d="M 175 198 L 175 228 C 175 234,184 235,184 242
                             C 184 246,154 246,154 242 C 154 235,157 228,157 198 Z"
                          fill="#fff" stroke="#1d1d1f" stroke-width="4.5" stroke-linejoin="round"/>
                    <path d="M 157 228 Q 167 231 177 228"
                          fill="none" stroke="#1d1d1f" stroke-width="4.5" stroke-linecap="round"/>
                </g>

                <!-- Torso -->
                <path d="M 120 148 C 108 148,108 200,122 205 C 132 208,168 208,178 205
                         C 192 200,192 148,180 148 Z"
                      fill="#fff" stroke="#1d1d1f" stroke-width="4.5" stroke-linejoin="round"/>

                <!-- Collar -->
                <path d="M 125 147 Q 150 153 175 147"
                      fill="none" stroke="#1d1d1f" stroke-width="4.5" stroke-linecap="round"/>

                <!-- Left Arm — STATIC forever (id + CSS lock) -->
                <path id="left-arm"
                      d="M 120 150 C 97 150,95 182,99 196 C 102 203,114 203,118 196
                         C 122 188,124 170,124 158 Z"
                      fill="#fff" stroke="#1d1d1f" stroke-width="4.5" stroke-linejoin="round"/>

                <!-- Right Arm — also static (no hover CSS) -->

                <rect x="94"  y="90" width="13" height="30" rx="6.5"
                      fill="#fff" stroke="#1d1d1f" stroke-width="4.5" stroke-linejoin="round"/>
                <rect x="193" y="90" width="13" height="30" rx="6.5"
                      fill="#fff" stroke="#1d1d1f" stroke-width="4.5" stroke-linejoin="round"/>

                <!-- Helmet -->
                <circle cx="150" cy="105" r="48"
                        fill="#fff" stroke="#1d1d1f" stroke-width="5" stroke-linejoin="round"/>

                <!-- Visor -->
                <ellipse id="visor-screen" cx="150" cy="107" rx="39" ry="34"
                         fill="#0b0c10" stroke="#1d1d1f" stroke-width="4.5" stroke-linejoin="round"/>

                <!-- Visor Highlights -->
                <g id="visor-highlights">
                    <path d="M 120 98 A 30 25 0 0 1 155 85 A 35 30 0 0 0 120 108 Z"
                          fill="#fff" opacity="0.85"/>
                    <circle cx="176" cy="98"  r="5.5" fill="#fff"/>
                    <circle cx="172" cy="112" r="3"   fill="#fff"/>
                </g>

                <!-- Chest Panel -->
                <rect x="130" y="156" width="40" height="24" rx="5"
                      fill="#f1f5f9" stroke="#1d1d1f" stroke-width="4"/>
                <path d="M 144 156 L 144 180"
                      stroke="#1d1d1f" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M 130 166 L 144 166"
                      stroke="#1d1d1f" stroke-width="2.5" stroke-linecap="round"/>

                <rect x="122" y="188" width="56" height="8" rx="4"

        </svg>

        <!-- TALK Button — anchored inside container, bottom -->
        <button class="talk-btn" id="mic-btn" onclick="triggerMic()">
            <svg class="mic-svg" viewBox="0 0 24 24">
                <rect x="9" y="2" width="6" height="11" rx="3"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8"  y1="23" x2="16" y2="23"/>
            </svg>
            <span class="btn-label">TALK</span>
        </button>

    </div><!-- .mascot-container -->

    <script>
        const bubble       = document.getElementById('speech-bubble');
        const astronaut    = document.getElementById('astronaut');
        const container    = document.getElementById('container');
        const particles    = document.getElementById('particles');
        const micBtn       = document.getElementById('mic-btn');
        const orbitTrack   = document.getElementById('orbit-track');
        const circularMenu = document.getElementById('circular-menu');

        const quotes = {
            idle: [
                "Ready to learn something cool? 🚀",
                "Don't forget to drink some water! 💧",
                "You're doing great — keep going! 💪",
                "Houston, we have no problems here! 😄",
                "Ask me anything — I'm all yours!",
                "Small steps every day lead to big wins! 🌟",
                "Need a break? Stretch a little! 🧘"
            ],
            thinking: [
                "Let me think... 🤔",
                "Searching my knowledge base... ✨",
                "Formulating a personalised tip...",
                "Processing... my circuits are spinning! ⚙️"
            ],
            dance: [
                "You completed a task! 🎉",
                "Brilliant job! 🌟",
                "You're crushing it! 🔥",
                "Amazing — keep the momentum! 🚀"
            ],
            sad: [
                "Got an error? Let's fix it together! 🔧",
                "Errors mean you're trying. We've got this!",
                "Take a breath — you're doing great. 💙",
                "Every expert was once a beginner!"
            ],
            sleep: ["💤 Zzz... napping!", "😴 Taking a little rest..."],
            wake:  ["I'm awake! Let's go! 🌟", "You're back! Ready to learn? 🚀"]
        };

        const MAIN_MENU = [
            { id: 'dashboard',      label: 'Dashboard',     icon: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>' },
            { id: 'courses_group',   label: 'Courses',       icon: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>', hasSub: true },
            { id: 'vedika_group',    label: 'Vedika AI',     icon: '<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/>', hasSub: true },
            { id: 'jobs',           label: 'Jobs',          icon: '<rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' },
            { id: 'progress',       label: 'Progress',      icon: '<line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/>' },
            { id: 'labs_group',     label: 'Vedika Labs',   icon: '<circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.04-2.03.02-9.1-4.5-15.77s-10.33-10.02-12.37-8a1 1 0 0 0-.2.27m0 .2c-2.04 2.03-.02 9.1 4.5 15.77s10.33 10.02 12.37 8a1 1 0 0 0 .2-.27"/><path d="M3.8 20.2c-2.04-2.03-.02-9.1 4.5-15.77s10.33-10.02 12.37-8a1 1 0 1 1 .2.27m0-.2c2.04 2.03.02 9.1-4.5 15.77s-10.33 10.02-12.37 8a1 1 0 1 1-.2-.27"/>', hasSub: true }
        ];

        const SUB_MENUS = {
            courses_group: [
                { id: 'back',           label: 'Back',          icon: '<line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/>', isBack: true },
                { id: 'courses',        label: 'Courses',       icon: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>' },
                { id: 'quizzes',        label: 'Quizzes',       icon: '<circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>' },
                { id: 'assignments',    label: 'Assignments',   icon: '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>' },
                { id: 'resources',      label: 'Resources',     icon: '<path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/>' }
            ],
            vedika_group: [
                { id: 'back',           label: 'Back',          icon: '<line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/>', isBack: true },
                { id: 'general-tutor',  label: 'Ask Vedika',    icon: '<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/>' },
                { id: 'coding-tutor',   label: 'Code Tutor',    icon: '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>' },
                { id: 'code-puzzle',    label: 'Code Puzzle',   icon: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>' },
                { id: 'viva-interview', label: 'Viva/Interview', icon: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>' }
            ],
            labs_group: [
                { id: 'back',           label: 'Back',          icon: '<line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/>', isBack: true },
                { id: 'physics-lab',    label: 'Physics Lab',   icon: '<circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.04-2.03.02-9.1-4.5-15.77s-10.33-10.02-12.37-8a1 1 0 0 0-.2.27m0 .2c-2.04 2.03-.02 9.1 4.5 15.77s10.33 10.02 12.37 8a1 1 0 0 0 .2-.27"/><path d="M3.8 20.2c-2.04-2.03-.02-9.1 4.5-15.77s10.33-10.02 12.37-8a1 1 0 1 1 .2.27m0-.2c2.04 2.03.02 9.1-4.5 15.77s-10.33 10.02-12.37 8a1 1 0 1 1-.2-.27"/>' },
                { id: 'chemistry-lab',  label: 'Chem Lab',      icon: '<path d="M10 2v4c0 1-1 2.2-1.4 2.7L5 14c-.7.7-1 1.7-1 2.6C4 19 6.2 21 9 21h6c2.8 0 5-2 5-4.4 0-1-.3-1.9-1-2.6L15.4 8.7C15 8.2 14 7 14 6V2"/><path d="M8.5 2h7"/><path d="M7 16h10"/>' },
                { id: 'biology-lab',    label: 'Bio Lab',       icon: '<path d="m8 8 8 8"/><path d="M12 2v6"/><path d="M12 16v6"/><path d="M16 8c-2-2-6-2-8 0"/><path d="M16 16c-2 2-6 2-8 0"/><path d="M17.5 4.5c-1-1.5-3-1.5-4 0l-1.5 1.5"/><path d="M6.5 19.5c1 1.5 3 1.5 4 0l1.5-1.5"/><path d="M17.5 19.5c-1 1.5-3 1.5-4 0l-1.5-1.5"/><path d="M6.5 4.5c1-1.5 3-1.5 4 0l1.5 1.5"/>' }
            ]
        };

        const RADIUS = 105;
        const CX = 150;
        const CY = 140;

        let bubbleTimeout    = null;
        let particleInterval = null;
        let currentState     = 'idle';
        
        let webappConnected  = false;
        let menuOpen         = false;
        let isSpinning       = false;
        let currentMenu      = MAIN_MENU;

        /* ── renderMenu ── */
        function renderMenu(items) {
            currentMenu = items;
            circularMenu.innerHTML = '';
            
            items.forEach((item, i) => {
                const angle = (i / items.length) * 2 * Math.PI - Math.PI / 2;
                const tx = Math.cos(angle) * RADIUS;
                const ty = Math.sin(angle) * RADIUS;
                
                const btn = document.createElement('div');
                btn.className = 'menu-item';
                btn.id = 'menu-' + item.id;
                
                let tpClass = 'tp-top';
                if (tx > 40) tpClass = 'tp-right';
                else if (tx < -40) tpClass = 'tp-left';
                else if (ty > 40) tpClass = 'tp-bottom';
                
                btn.classList.add(tpClass);
                btn.style.setProperty('--tx', tx + 'px');
                btn.style.setProperty('--ty', ty + 'px');
                
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24">${item.icon}</svg>
                    <span class="tooltip">${item.label}</span>
                `;
                
                if (menuOpen) {
                    btn.style.opacity = '1';
                    btn.style.transform = `translate(${tx}px, ${ty}px) scale(1)`;
                }
                
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (isSpinning) return;
                    
                    if (item.isBack) {
                        switchMenu(MAIN_MENU);
                    } else if (item.hasSub) {
                        switchMenu(SUB_MENUS[item.id]);
                    } else {
                        toggleCircularMenu(false);
                        triggerNavigation(item.id);
                    }
                });
                
                circularMenu.appendChild(btn);
            });
        }

        /* ── switchMenu ── */
        function switchMenu(newMenu) {
            document.querySelectorAll('.menu-item').forEach((btn) => {
                btn.style.opacity = '0';
                btn.style.transform = 'translate(0, 0) scale(0)';
            });
            setTimeout(() => {
                renderMenu(newMenu);
                currentMenu.forEach((item, i) => {
                    const btn = document.getElementById('menu-' + item.id);
                    if (btn) {
                        const tx = btn.style.getPropertyValue('--tx');
                        const ty = btn.style.getPropertyValue('--ty');
                        setTimeout(() => {
                            btn.style.opacity = '1';
                            btn.style.transform = `translate(${tx}, ${ty}) scale(1)`;
                        }, i * 35);
                    }
                });
            }, 250);
        }

        /* ── setWebappConnected ── */
        function setWebappConnected(connected) {
            webappConnected = connected;
            console.log('[Mascot] Webapp connection status:', connected);
            if (!connected && menuOpen) {
                toggleCircularMenu(false);
            }
        }

        /* ── toggleCircularMenu ── */
        function toggleCircularMenu(open) {
            if (open === undefined) open = !menuOpen;
            menuOpen = open;
            
            if (open) {
                orbitTrack.classList.add('visible');
                currentMenu.forEach((item, i) => {
                    const btn = document.getElementById('menu-' + item.id);
                    if (btn) {
                        const tx = btn.style.getPropertyValue('--tx');
                        const ty = btn.style.getPropertyValue('--ty');
                        setTimeout(() => {
                            btn.style.opacity = '1';
                            btn.style.transform = `translate(${tx}, ${ty}) scale(1)`;
                        }, i * 35);
                    }
                });
            } else {
                orbitTrack.classList.remove('visible');
                document.querySelectorAll('.menu-item').forEach((btn) => {
                    btn.style.opacity = '0';
                    btn.style.transform = 'translate(0, 0) scale(0)';
                });
                setTimeout(() => {
                    if (!menuOpen) {
                        renderMenu(MAIN_MENU);
                    }
                }, 350);
            }
        }

        /* ── triggerNavigation ── */
        function triggerNavigation(pageId) {
            document.title = '__CMD__navigate:' + pageId;
        }

        /* ── triggerMascotSpinAndNavigate ── */
        function triggerMascotSpinAndNavigate(targetPage, forceSpin = false) {
            if (isSpinning) return;
            isSpinning = true;

            let activeItems = MAIN_MENU;
            if (SUB_MENUS.courses_group.some(item => item.id === targetPage)) {
                activeItems = SUB_MENUS.courses_group;
            } else if (SUB_MENUS.vedika_group.some(item => item.id === targetPage)) {
                activeItems = SUB_MENUS.vedika_group;
            } else if (SUB_MENUS.labs_group.some(item => item.id === targetPage)) {
                activeItems = SUB_MENUS.labs_group;
            }

            renderMenu(activeItems);
            toggleCircularMenu(true);

            let currentStep = 0;
            const totalSteps = activeItems.length * 2;
            const targetIndex = activeItems.findIndex(item => item.id === targetPage);
            
            const runSpinStep = () => {
                document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active-item'));
                
                const currentIndex = currentStep % activeItems.length;
                const currentItem = activeItems[currentIndex];
                const btn = document.getElementById('menu-' + currentItem.id);
                if (btn) btn.classList.add('active-item');

                const isFinalLap = currentStep >= activeItems.length;
                const isTarget = currentIndex === targetIndex;

                if (isFinalLap && isTarget && currentStep >= totalSteps - activeItems.length) {
                    setTimeout(() => {
                        if (btn) btn.classList.add('active-item');
                        setTimeout(() => {
                            isSpinning = false;
                            toggleCircularMenu(false);
                            triggerNavigation(targetPage);
                        }, 600);
                    }, 200);
                } else {
                    currentStep++;
                    const delay = 65 + (currentStep * 8);
                    setTimeout(runSpinStep, delay);
                }
            };

            setTimeout(runSpinStep, 200);
        }

        /* ── setMascotState — called from Python ── */
        function setMascotState(state) {
            currentState = state;
            const valid = ['idle','thinking','dance','sad','sleep','wake'];
            document.body.className = 'state-' + (valid.includes(state) ? state : 'idle');

            clearInterval(particleInterval);
            particles.innerHTML = '';

            if (state === 'dance') {
                particleInterval = setInterval(() => spawnParticle('⭐','#38bdf8'), 230);
            } else if (state === 'thinking') {
                particleInterval = setInterval(() => spawnParticle('?','#f59e0b'), 440);
            } else if (state === 'sad') {
                particleInterval = setInterval(() => spawnParticle('💧','#3b82f6'), 540);
            } else if (state === 'sleep') {
                particleInterval = setInterval(() => spawnParticle('💤','#64748b'), 1500);
            } else if (state === 'wake') {
                for (let i = 0; i < 8; i++)
                    setTimeout(() => spawnParticle('✨','#fbbf24'), i * 110);
            }
        }

        function spawnParticle(symbol, color) {
            const p = document.createElement('div');
            p.className   = 'particle';
            p.textContent = symbol;
            p.style.color = color;
            p.style.left  = (110 + Math.random() * 80) + 'px';
            p.style.top   = (110 + Math.random() * 80) + 'px';
            const angle = Math.random() * Math.PI * 2;
            const dist  = 48 + Math.random() * 78;
            p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--ty', Math.sin(angle) * dist - 18 + 'px');
            particles.appendChild(p);
            setTimeout(() => p.remove(), 1500);
        }

        /* ── showSpeechBubble — called from Python ── */
        function showSpeechBubble(text) {
            bubble.textContent = text || '';
            bubble.classList.add('visible');
            clearTimeout(bubbleTimeout);
            const duration = Math.max(3000, Math.min(text.length * 45, 10000));
            bubbleTimeout = setTimeout(() => bubble.classList.remove('visible'), duration);
        }

        /* ── showQuote — random quote for current state ── */
        function showQuote(customText) {
            if (customText) { showSpeechBubble(customText); return; }
            const pool = quotes[currentState] || quotes.idle;
            showSpeechBubble(pool[Math.floor(Math.random() * pool.length)]);
        }

        /* ── setListening — called from Python ── */
        function setListening(active) {
            if (active) {
                micBtn.classList.add('listening');
                micBtn.querySelector('.btn-label').textContent = 'LISTENING';
            } else {
                micBtn.classList.remove('listening');
                micBtn.querySelector('.btn-label').textContent = 'TALK';
            }
        }

        /* ── Mic trigger via title bridge ── */
        function triggerMic() {
            document.title = '__CMD__listen';
        }

        /* ── Trigger Custom Animation ── */
        function triggerCustomAnimation(animName) {
            const valid = ['wave', 'nod', 'shake'];
            if (!valid.includes(animName)) return;

            container.classList.remove('anim-wave', 'anim-nod', 'anim-shake');
            void container.offsetWidth;
            container.classList.add('anim-' + animName);

            if (animName === 'wave') {
                for (let i = 0; i < 4; i++) {
                    setTimeout(() => spawnParticle('⭐', '#38bdf8'), i * 150);
                }
            } else if (animName === 'nod') {
                spawnParticle('👍', '#22c55e');
            } else if (animName === 'shake') {
                spawnParticle('❓', '#f87171');
            }

            setTimeout(() => {
                container.classList.remove('anim-' + animName);
            }, 1000);
        }

        /* ── Click on mascot body: toggle circular menu if connected, else show quote ── */
        container.addEventListener('click', (e) => {
            if (micBtn.contains(e.target)) return;   
            if (currentState === 'sleep') return;     
            if (isSpinning) return;
            
            if (webappConnected) {
                toggleCircularMenu();
            } else {
                showQuote();
            }
        });

        /* ── Expose to Python ── */
        window.setMascotState         = setMascotState;
        window.showSpeechBubble       = showSpeechBubble;
        window.showQuote              = showQuote;
        window.setListening           = setListening;
        window.triggerCustomAnimation = triggerCustomAnimation;
        window.setWebappConnected     = setWebappConnected;
        window.triggerMascotSpinAndNavigate = triggerMascotSpinAndNavigate;

        // Init circular menu
        renderMenu(MAIN_MENU);

        /* ── Init ── */
        setMascotState('idle');
        setTimeout(() => showSpeechBubble("Hi! I'm Vedika, your AI companion! 🚀"), 800);
    </script>
